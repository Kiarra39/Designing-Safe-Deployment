name: Safe Deployment Pipeline

on:
  push:
    branches:
      - main
      - master
      - 'fix/**'
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Record metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            dist/
            scripts/

  security:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Secret scan placeholder
        run: echo "No hard-coded secrets detected in this workflow step"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/fix/'))
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Deploy to staging
        env:
          DRY_RUN: 1
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          echo "Deploying build artifact to staging for commit ${{ needs.validate.outputs.sha }}"
          bash scripts/deploy.sh

      - name: Run smoke test
        run: |
          echo "Running smoke checks against staging"
          node src/index.js > /tmp/orion-api.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:3000/health >/tmp/health.out 2>/dev/null; then
              break
            fi
            sleep 1
          done
          bash scripts/healthcheck.sh http://127.0.0.1:3000

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Deploy to production
        env:
          DRY_RUN: 1
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          echo "Production deploy approved for commit ${{ needs.validate.outputs.sha }}"
          bash scripts/deploy.sh

  verify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Report status
        run: |
          echo "Commit SHA: ${{ github.sha }}"
          echo "Workflow status: ${{ job.status }}"
          echo "Pipeline timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Roll back on verification failure
        if: ${{ failure() || needs.deploy-staging.result != 'success' || (github.ref == 'refs/heads/main' && needs.deploy-production.result != 'success') }}
        env:
          DRY_RUN: 1
          PREV_TAG: previous
        run: |
          echo "Verification failed; triggering rollback flow"
          bash scripts/rollback.sh previous

      - name: Notify team
        if: always()
        run: |
          echo "Deployment pipeline finished with status: ${{ needs.deploy-staging.result }} / ${{ needs.deploy-production.result }}"
