name: Deploy Orion API

on:
  push:
    branches:
      - main
      - master
      - 'fix/**'
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test

  security:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploying to staging"
      - run: bash scripts/deploy.sh
        env:
          DRY_RUN: 1
          IMAGE_TAG: staging-${{ github.sha }}
      - run: |
          node src/index.js > /tmp/orion-api.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:3000/health >/tmp/health.out 2>/dev/null; then
              break
            fi
            sleep 1
          done
          bash scripts/healthcheck.sh http://127.0.0.1:3000

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://example.com
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy to production requires approval"
      - run: bash scripts/deploy.sh
        env:
          DRY_RUN: 1
          IMAGE_TAG: prod-${{ github.sha }}

  verify:
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - run: echo "Workflow completed"
      - if: ${{ failure() || needs.deploy-staging.result != 'success' || needs.deploy-production.result != 'success' }}
        run: bash scripts/rollback.sh previous
